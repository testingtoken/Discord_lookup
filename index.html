<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTRY INSIGHT ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root { --main: #6366f1; --bg: #030407; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .main-gradient { background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent), radial-gradient(circle at bottom left, rgba(168, 85, 247, 0.1), transparent); }
        .glass { background: rgba(13, 15, 23, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-prime { background: linear-gradient(135deg, #6366f1, #a855f7); transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .btn-prime:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 15px 30px -10px rgba(99, 102, 241, 0.5); }
        .avatar-frame { border: 6px solid var(--bg); box-shadow: 0 10px 40px rgba(0,0,0,0.5); transition: all 0.5s ease; }
        .banner-glow { position: relative; overflow: hidden; }
        .banner-glow::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, var(--bg)); }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 16px; }
        .shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); background-size: 200% 100%; animation: loading 2s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 main-gradient">
    <div class="w-full max-w-lg space-y-8">
        <div class="text-center space-y-2 animate__animated animate__fadeIn">
            <h1 class="text-5xl font-extrabold tracking-tighter italic">SENTRY<span class="text-indigo-500 underline">INSIGHT</span></h1>
            <p class="text-slate-500 font-medium text-xs uppercase tracking-[0.4em]">Advanced Profile Intelligence</p>
        </div>
        <div class="glass p-2.5 rounded-[30px] flex gap-3 shadow-2xl animate__animated animate__fadeInUp">
            <input type="text" id="targetId" placeholder="ID Discord..." class="bg-transparent flex-1 px-6 outline-none font-bold text-lg placeholder-slate-700">
            <button onclick="lookup()" class="btn-prime px-10 py-5 rounded-[22px] font-black text-[11px] uppercase tracking-widest">Analyser</button>
        </div>
        <div id="loader" class="hidden flex flex-col items-center py-10 animate__animated animate__fadeIn">
            <div class="w-12 h-12 border-[3px] border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-[9px] mt-6 text-indigo-400 font-black uppercase tracking-[0.5em]">Liaison satellite en cours</p>
        </div>
        <div id="card" class="hidden animate__animated animate__zoomIn">
            <div class="glass rounded-[40px] overflow-hidden shadow-[0_40px_80px_-15px_rgba(0,0,0,0.7)]">
                <div id="banner" class="h-44 w-full banner-glow bg-cover bg-center transition-all duration-1000"></div>
                <div class="px-10 pb-10 flex flex-col items-center -mt-20 relative">
                    <div class="relative group">
                        <img id="avatar" src="" class="w-36 h-36 rounded-[45px] avatar-frame bg-slate-900 object-cover">
                        <button onclick="dl('avatar')" class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 rounded-[45px] flex items-center justify-center transition-all text-[10px] font-bold">SAVE</button>
                    </div>
                    <div class="text-center mt-8">
                        <h2 id="name" class="text-4xl font-black tracking-tighter">---</h2>
                        <p id="tag" class="text-indigo-400 font-extrabold text-sm mt-1">@---</p>
                    </div>
                    <div class="w-full grid grid-cols-1 gap-4 mt-10">
                        <div class="stat-card flex justify-between items-center group">
                            <span class="text-[10px] text-slate-500 font-black uppercase tracking-widest">Date de création</span>
                            <span id="date" class="text-sm font-bold text-indigo-100">---</span>
                        </div>
                        <div class="stat-card flex justify-between items-center">
                            <span class="text-[10px] text-slate-500 font-black uppercase tracking-widest">ID Unique</span>
                            <span id="resId" class="text-[11px] font-mono text-indigo-400">---</span>
                        </div>
                    </div>
                    <div class="w-full grid grid-cols-2 gap-4 mt-8">
                        <button onclick="dl('avatar')" class="py-5 bg-white text-black rounded-3xl font-black text-[10px] uppercase tracking-widest hover:bg-indigo-50 transition-all">Avatar HD</button>
                        <button id="btnB" onclick="dl('banner')" class="py-5 bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 rounded-3xl font-black text-[10px] uppercase tracking-widest hover:bg-indigo-500/20 transition-all">Bannière HD</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        let uData = null;
        async function lookup() {
            const id = document.getElementById('targetId').value.trim();
            if(!id) return;
            document.getElementById('card').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            try {
                const res = await fetch(`/api/user/${id}`);
                const data = await res.json();
                if(data.success) {
                    uData = data;
                    document.getElementById('name').innerText = data.globalName;
                    document.getElementById('tag').innerText = `@${data.username}`;
                    document.getElementById('resId').innerText = data.id;
                    document.getElementById('date').innerText = data.createdAt;
                    document.getElementById('avatar').src = data.avatar;
                    const b = document.getElementById('banner');
                    const btnB = document.getElementById('btnB');
                    if(data.banner) {
                        b.style.backgroundImage = `url(${data.banner})`;
                        btnB.style.display = "block";
                    } else {
                        b.style.backgroundImage = 'none';
                        b.style.backgroundColor = data.bannerColor;
                        btnB.style.display = "none";
                    }
                    document.getElementById('avatar').onload = () => {
                        document.getElementById('loader').classList.add('hidden');
                        document.getElementById('card').classList.remove('hidden');
                    };
                } else {
                    alert(data.error);
                    document.getElementById('loader').classList.add('hidden');
                }
            } catch (e) {
                alert("Erreur de connexion");
                document.getElementById('loader').classList.add('hidden');
            }
        }
        function dl(t) {
            if(!uData) return;
            const url = t === 'avatar' ? uData.avatar : uData.banner;
            if(url) window.open(url, '_blank');
        }
    </script>
</body>
</html>
