<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTRY // INSIGHT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #050609; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .premium-card { background: rgba(15, 17, 26, 0.7); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .btn-grad { background: linear-gradient(135deg, #6366f1, #8b5cf6); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-grad:hover { transform: scale(1.05); filter: brightness(1.2); }
        .avatar-ring { border: 6px solid #050609; box-shadow: 0 0 20px rgba(0,0,0,0.4); }
        .banner-overlay { background: linear-gradient(to bottom, transparent, rgba(5,6,9,0.8)); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md space-y-6">
        <div class="premium-card p-3 flex gap-2 animate__animated animate__fadeInDown">
            <input type="text" id="targetId" placeholder="Entrez l'ID unique..." class="bg-transparent flex-1 px-4 outline-none font-semibold text-indigo-100">
            <button onclick="lookup()" class="btn-grad px-6 py-3 rounded-2xl font-bold text-xs uppercase tracking-widest">Scanner</button>
        </div>

        <div id="loader" class="hidden text-center py-10 animate-pulse text-indigo-400 font-bold uppercase tracking-widest text-[10px]">Initialisation du lien neural...</div>

        <div id="card" class="hidden animate__animated animate__zoomIn">
            <div class="premium-card overflow-hidden">
                <div id="bannerBox" class="h-40 w-full relative bg-indigo-600 bg-cover bg-center">
                    <div class="absolute inset-0 banner-overlay"></div>
                </div>
                
                <div class="px-8 pb-8 flex flex-col items-center -mt-16 relative">
                    <img id="avatar" src="" class="w-32 h-32 rounded-[2.5rem] avatar-ring bg-slate-800">
                    
                    <div class="text-center mt-6">
                        <h2 id="name" class="text-3xl font-extrabold tracking-tight italic">---</h2>
                        <p id="tag" class="text-indigo-400 font-bold text-sm">@---</p>
                    </div>

                    <div class="w-full grid grid-cols-2 gap-3 mt-8">
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Ancienneté</p>
                            <p id="date" class="text-sm font-semibold text-slate-200">---</p>
                        </div>
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                            <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">ID Stable</p>
                            <p id="resId" class="text-[10px] font-mono text-indigo-300 truncate">---</p>
                        </div>
                    </div>

                    <div class="w-full space-y-3 mt-8">
                        <button onclick="download('avatar')" class="w-full py-4 bg-white text-black rounded-2xl font-black text-xs flex items-center justify-center gap-2 hover:bg-indigo-50 transition-all uppercase">
                            Télécharger Avatar
                        </button>
                        <button id="dlBanner" onclick="download('banner')" class="w-full py-4 bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 rounded-2xl font-black text-xs flex items-center justify-center gap-2 hover:bg-indigo-500/20 transition-all uppercase">
                            Télécharger Bannière
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentData = null;

        async function lookup() {
            const id = document.getElementById('targetId').value.trim();
            if(!id) return;
            
            document.getElementById('card').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');

            try {
                const response = await fetch(`/api/user/${id}`);
                const data = await response.json();

                if(data.success) {
                    currentData = data;
                    document.getElementById('name').innerText = data.globalName;
                    document.getElementById('tag').innerText = `@${data.username}`;
                    document.getElementById('resId').innerText = data.id;
                    document.getElementById('date').innerText = data.createdAt;
                    
                    // Gestion Avatar
                    document.getElementById('avatar').src = data.avatar;
                    
                    // Gestion Bannière
                    const bannerBox = document.getElementById('bannerBox');
                    if(data.banner) {
                        bannerBox.style.backgroundImage = `url(${data.banner})`;
                        document.getElementById('dlBanner').classList.remove('opacity-50', 'pointer-events-none');
                    } else {
                        bannerBox.style.backgroundImage = 'none';
                        bannerBox.style.backgroundColor = data.bannerColor;
                        document.getElementById('dlBanner').classList.add('opacity-50', 'pointer-events-none');
                    }

                    // On attend que l'image soit chargée pour afficher (évite le bug du 2ème clic)
                    document.getElementById('avatar').onload = () => {
                        document.getElementById('loader').classList.add('hidden');
                        document.getElementById('card').classList.remove('hidden');
                    };
                } else {
                    alert("Utilisateur introuvable");
                    document.getElementById('loader').classList.add('hidden');
                }
            } catch (e) {
                alert("Erreur Serveur");
                document.getElementById('loader').classList.add('hidden');
            }
        }

        function download(type) {
            if(!currentData) return;
            const url = type === 'avatar' ? currentData.avatar : currentData.banner;
            if(!url) return;
            
            const link = document.createElement('a');
            link.href = url;
            link.target = '_blank'; // Sur mobile, ça ouvre l'image pour l'enregistrer
            link.download = `${type}-${currentData.id}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
